##############################################################################
# deploy-quartz.yml
# Build the KB as a Quartz static site and deploy to GitHub Pages.
#
# Place this file at: .github/workflows/deploy-quartz.yml in the
# <your-username>/<your-kb-repo> repo.
#
# Trigger: every push to main (i.e., after each agent run commits analyses)
# Also: manual dispatch for ad-hoc rebuilds
##############################################################################

name: Deploy KB to GitHub Pages (Quartz)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Check out the KB repo (your markdown content)
      - name: Checkout KB repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so Quartz can read git dates

      # 2. Clone Quartz v4 into a separate directory
      - name: Clone Quartz
        run: |
          git clone --depth 1 --branch v4 https://github.com/jackyzha0/quartz.git _quartz

      # 3. Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 4. Install Quartz dependencies
      - name: Install Quartz dependencies
        working-directory: _quartz
        run: npm ci

      # 5. Copy KB content into Quartz's content directory
      #    Everything except hidden dirs, the quartz scaffold dir,
      #    and non-content files goes into _quartz/content/
      - name: Copy KB content to Quartz
        run: |
          # Copy all markdown and content directories
          rsync -av --progress \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_quartz' \
            --exclude='quartz' \
            --exclude='node_modules' \
            --exclude='*.py' \
            --exclude='*.yml' \
            --exclude='*.yaml' \
            --exclude='*.sh' \
            --exclude='*.docx' \
            --exclude='*.jsonl' \
            --exclude='url_sources.json' \
            --exclude='setup.py' \
            --exclude='run.py' \
            --exclude='migrate_repo.py' \
            ./ _quartz/content/

      # 6. Overlay our custom Quartz config files
      - name: Apply custom Quartz config
        run: |
          # Copy config files from the quartz/ scaffold directory in the KB repo
          if [ -f quartz/quartz.config.ts ]; then
            cp quartz/quartz.config.ts _quartz/quartz.config.ts
          fi
          if [ -f quartz/quartz.layout.ts ]; then
            cp quartz/quartz.layout.ts _quartz/quartz.layout.ts
          fi
          # Copy custom CSS if it exists
          if [ -f quartz/custom.scss ]; then
            cp quartz/custom.scss _quartz/quartz/styles/custom.scss
          fi

      # 7. Build the static site
      - name: Build Quartz
        working-directory: _quartz
        run: npx quartz build

      # 8. Upload build artifact for GitHub Pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _quartz/public

      # 9. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
